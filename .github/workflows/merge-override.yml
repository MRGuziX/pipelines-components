name: Merge Override

on:
  issue_comment:
    types: [created]

jobs:
  override:
    name: Process /merge-anyway
    if: >-
      github.event.issue.pull_request
      && contains(github.event.comment.body, '/merge-anyway')
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: write
    steps:
      - name: Check permissions and override
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;
            const prNumber = context.payload.issue.number;

            // Acknowledge the command
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

            // Check if commenter is admin or maintainer
            const { data: permData } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: commenter,
            });

            const permission = permData.permission;
            const allowed = permission === 'admin' || permission === 'maintain';

            if (!allowed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `@${commenter} Only repo admins and maintainers can use \`/merge-anyway\`. Your permission level: \`${permission}\`.`,
              });
              core.setFailed(`User ${commenter} does not have admin/maintain permissions (has: ${permission})`);
              return;
            }

            // Get the PR head SHA to post the status against
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Post a passing commit status for the Smoke Results check
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.head.sha,
              state: 'success',
              context: 'Smoke Results',
              description: `Overridden by @${commenter} via /merge-anyway`,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Smoke test gate overridden by @${commenter}. The \`Smoke Results\` check has been set to passing.`,
            });

            core.info(`Override applied by ${commenter} for PR #${prNumber}`);
